services:
  postgres:
    image: postgres:16-alpine
    container_name: palpites_postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: palpites
      POSTGRES_PASSWORD: palpites
      POSTGRES_DB: palpites_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    container_name: palpites_postgres_test
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: palpites
      POSTGRES_PASSWORD: palpites
      POSTGRES_DB: palpites_test

volumes:
  postgres_data:
